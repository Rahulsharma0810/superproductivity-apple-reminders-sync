name: CI

# Runs on every push to main and on pull requests. Keeps main releasable by
# verifying types, tests, lint, and that the plugin actually packages.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Package plugin (.zip)
        run: npm run package

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: sync-reminders-plugin
          path: ./*.zip
          if-no-files-found: error
